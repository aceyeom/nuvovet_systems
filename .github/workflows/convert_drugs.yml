name: Convert Drug Monographs

on:
  workflow_dispatch:  # 수동 실행
  schedule:
    - cron: '0 15 * * *'  # 00:00 KST
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 3 * * *'   # 12:00 KST

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 최대 6시간

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run conversion script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python 실험실.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/converted/
          git add conversion_errors.log || true
          git diff --cached --quiet || git commit -m "chore: auto-convert drug monographs [skip ci]"
          git push
