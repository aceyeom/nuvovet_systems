name: Convert Drug Monographs

on:
  workflow_dispatch:  # 수동 실행
    inputs:
      batch_size:
        description: "배치당 처리 약물 수"
        required: false
        default: "20"
  schedule:
    - cron: '0 15 * * *'  # 00:00 KST
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 9 * * *'   # 18:00 KST

permissions:
  contents: write
  models: read

concurrency:
  group: convert-drugs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan_batches:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.plan.outputs.batches }}
      total_drugs: ${{ steps.plan.outputs.total_drugs }}
      total_missing: ${{ steps.plan.outputs.total_missing }}
      batch_size: ${{ steps.plan.outputs.batch_size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Plan batch matrix
        id: plan
        env:
          WORKFLOW_BATCH_SIZE: ${{ github.event.inputs.batch_size || '70' }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import re

          files = sorted(
              glob.glob("plumbs_output/*.jsonl"),
              key=lambda p: int(os.path.splitext(os.path.basename(p))[0])
          )

          def output_path_for(ingredient: str) -> str:
              safe_name = re.sub(r"[^\w\-]", "_", ingredient.lower()).strip("_")
              first_letter = ingredient[0].upper() if ingredient else "_"
              if not first_letter.isalpha():
                  first_letter = "_"
              return os.path.join("backend", "data", "converted", first_letter, f"{safe_name}.jsonl")

          total = 0
          missing_drugs = []
          for path in files:
              with open(path, encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue

                      total += 1
                      try:
                          drug = json.loads(line)
                      except json.JSONDecodeError:
                          continue

                      ingredient = drug.get("ingredient", "")
                      if not ingredient:
                          continue

                      if not os.path.exists(output_path_for(ingredient)):
                          missing_drugs.append(ingredient)

          batch_size_raw = os.environ.get("WORKFLOW_BATCH_SIZE") or "70"
          try:
              batch_size = max(int(batch_size_raw), 1)
          except ValueError:
              batch_size = 70

          batches = []
          for start in range(0, len(missing_drugs), batch_size):
              batch_ingredients = missing_drugs[start:start + batch_size]
              batches.append(
                  {
                      "index": len(batches) + 1,
                      "count": len(batch_ingredients),
                      "ingredients": batch_ingredients,
                  }
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"total_drugs={total}\n")
              out.write(f"total_missing={len(missing_drugs)}\n")
              out.write(f"batch_size={batch_size}\n")
              out.write(f"batches={json.dumps(batches)}\n")

          print(
              f"Planned {len(batches)} batches for {len(missing_drugs)} missing drugs "
              f"(total={total}, batch_size={batch_size})"
          )
          PY

      - name: Plan summary
        run: |
          echo "total_drugs=${{ steps.plan.outputs.total_drugs }}"
          echo "total_missing=${{ steps.plan.outputs.total_missing }}"
          echo "planned_batch_size=${{ steps.plan.outputs.batch_size }}"

  convert:
    needs: plan_batches
    if: needs.plan_batches.outputs.total_missing != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        batch: ${{ fromJSON(needs.plan_batches.outputs.batches) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate API key presence
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY || vars.CLAUDE_API_KEY }}
        run: |
          if [ -z "$CLAUDE_API_KEY" ]; then
            echo "CLAUDE_API_KEY is missing; aborting before any API calls."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run conversion script (batch)
        env:
          # Prefer secret; fallback to repository variable if configured there.
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY || vars.CLAUDE_API_KEY }}
          BATCH_INGREDIENTS: ${{ toJSON(matrix.batch.ingredients) }}
        run: |
          python 실험실.py \
            --ingredients-json "$BATCH_INGREDIENTS"

      - name: Upload error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-batch-${{ matrix.batch.index }}
          path: conversion_errors.log
          if-no-files-found: ignore  # 에러가 발생하지 않아 로그 파일이 없을 때 경고가 뜨지 않게 변경
          retention-days: 7          # 에러 로그는 오래 보관할 필요가 없으므로 30일 -> 7일로 단축
      - name: Commit and push batch results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/converted/
          git add conversion_errors.log || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-convert batch ${{ matrix.batch.index }} [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          else
            echo "No changes to commit for batch ${{ matrix.batch.index }}"
          fi

      - name: Batch summary
        if: always()
        run: |
          echo "batch_index=${{ matrix.batch.index }}"
          echo "batch_count=${{ matrix.batch.count }}"
          echo "total_drugs=${{ needs.plan_batches.outputs.total_drugs }}"
          echo "total_missing=${{ needs.plan_batches.outputs.total_missing }}"
          echo "planned_batch_size=${{ needs.plan_batches.outputs.batch_size }}"

  no_work:
    needs: plan_batches
    if: needs.plan_batches.outputs.total_missing == '0'
    runs-on: ubuntu-latest
    steps:
      - name: Nothing to convert
        run: |
          echo "No missing converted outputs detected."
          echo "total_drugs=${{ needs.plan_batches.outputs.total_drugs }}"
